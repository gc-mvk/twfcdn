<!doctype html>

    <title>QR Code Keys</title>
    <style>
        * { box-sizing: border-box; }
        body {
            margin: 0;
            padding: 24px;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #f5f6f8;
            color: #212529;
        }
        h1 {
            margin: 0 0 20px 0;
            font-size: 1.5rem;
            font-weight: 600;
            text-align: center;
        }
        .qr-grid {
            display: grid;
            grid-template-columns: repeat(6, minmax(0, 1fr));
            gap: 16px;
            max-width: 1200px;
            margin: 0 auto;
        }
        .qr-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            padding: 12px;
            border: 1px solid #0d6efd;
            border-radius: 8px;
            background-color: #ffffff;
            box-shadow: 0 1px 2px rgba(0, 0, 0, 0.05);
            text-align: center;
        }
        .qr-item .qr-image {
            width: 100%;
            max-width: 140px;
            height: auto;
            display: block;
            image-rendering: pixelated;
        }
        .qr-item .qr-key {
            margin-top: 10px;
            font-family: "Courier New", monospace;
            font-size: 0.85rem;
            font-weight: 600;
            letter-spacing: 0.5px;
            color: #212529;
            word-break: break-all;
            line-height: 1.2;
        }
    </style>
</head>
