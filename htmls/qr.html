<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>QR Code Keys</title>
    <style>
        * { box-sizing: border-box; }
        body {
            margin: 0;
            padding: 24px;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #f5f6f8;
            color: #212529;
        }
        h1 {
            margin: 0 0 20px 0;
            font-size: 1.5rem;
            font-weight: 600;
            text-align: center;
        }
        .qr-grid {
            display: grid;
            grid-template-columns: repeat(6, minmax(0, 1fr));
            gap: 16px;
            max-width: 1200px;
            margin: 0 auto;
        }
        .qr-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            padding: 12px;
            border: 1px solid #0d6efd;
            border-radius: 8px;
            background-color: #ffffff;
            box-shadow: 0 1px 2px rgba(0, 0, 0, 0.05);
            text-align: center;
        }
        .qr-item .qr-image {
            width: 100%;
            max-width: 140px;
            height: auto;
            display: block;
            image-rendering: pixelated;
        }
        .qr-item .qr-key {
            margin-top: 10px;
            font-family: "Courier New", monospace;
            font-size: 0.85rem;
            font-weight: 600;
            letter-spacing: 0.5px;
            color: #212529;
            word-break: break-all;
            line-height: 1.2;
        }
    </style>
</head>
<body>
    <h1>QR Code Keys</h1>
    <div class="qr-grid">
        <div class="qr-item">
            <img class="qr-image" src="https://api.qrserver.com/v1/create-qr-code/?data=PILGRIMAGE01&amp;size=150x150" alt="QR code for PILGRIMAGE01" />
            <div class="qr-key">PILGRIMAGE01</div>
        </div>
        <div class="qr-item">
            <img class="qr-image" src="https://api.qrserver.com/v1/create-qr-code/?data=PILGRIMAGE02&amp;size=150x150" alt="QR code for PILGRIMAGE02" />
            <div class="qr-key">PILGRIMAGE02</div>
        </div>
        <div class="qr-item">
            <img class="qr-image" src="https://api.qrserver.com/v1/create-qr-code/?data=PILGRIMAGE03&amp;size=150x150" alt="QR code for PILGRIMAGE03" />
            <div class="qr-key">PILGRIMAGE03</div>
        </div>
        <div class="qr-item">
            <img class="qr-image" src="https://api.qrserver.com/v1/create-qr-code/?data=PILGRIMAGE04&amp;size=150x150" alt="QR code for PILGRIMAGE04" />
            <div class="qr-key">PILGRIMAGE04</div>
        </div>
        <div class="qr-item">
            <img class="qr-image" src="https://api.qrserver.com/v1/create-qr-code/?data=PILGRIMAGE05&amp;size=150x150" alt="QR code for PILGRIMAGE05" />
            <div class="qr-key">PILGRIMAGE05</div>
        </div>
        <div class="qr-item">
            <img class="qr-image" src="https://api.qrserver.com/v1/create-qr-code/?data=PILGRIMAGE06&amp;size=150x150" alt="QR code for PILGRIMAGE06" />
            <div class="qr-key">PILGRIMAGE06</div>
        </div>
        <div class="qr-item">
            <img class="qr-image" src="https://api.qrserver.com/v1/create-qr-code/?data=PILGRIMAGE07&amp;size=150x150" alt="QR code for PILGRIMAGE07" />
            <div class="qr-key">PILGRIMAGE07</div>
        </div>
        <div class="qr-item">
            <img class="qr-image" src="https://api.qrserver.com/v1/create-qr-code/?data=PILGRIMAGE08&amp;size=150x150" alt="QR code for PILGRIMAGE08" />
            <div class="qr-key">PILGRIMAGE08</div>
        </div>
        <div class="qr-item">
            <img class="qr-image" src="https://api.qrserver.com/v1/create-qr-code/?data=PILGRIMAGE09&amp;size=150x150" alt="QR code for PILGRIMAGE09" />
            <div class="qr-key">PILGRIMAGE09</div>
        </div> 
    </div>
</body>
</html>
